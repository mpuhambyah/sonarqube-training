server {
    listen 80;
    server_name 103.30.194.60 sonarqube-training.duckdns.org;

    # Redirect root to /sonarqube
    location = / {
        return 301 /sonarqube;
    }

    # SonarQube reverse proxy
    location /sonarqube {
        proxy_pass         http://localhost:9000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # SonarQube API calls (made without /sonarqube prefix)
    location /api/ {
        proxy_pass         http://localhost:9000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Codelabs static site
    location /codelabs/ {
        alias /var/www/sonarqube-training/;
        index index.html;
        try_files $uri $uri/ index.html =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
