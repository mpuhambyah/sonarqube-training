server {
    listen 80;
    server_name your-domain.com;  # Ganti dengan domain/IP VPS Anda

    root /var/www/sonarqube-training;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
