<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sonarBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#549dd0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b9fd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4b9fd5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#36b37e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="white">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="90" cy="30" r="1.5"/>
    <circle cx="130" cy="30" r="1.5"/>
    <circle cx="170" cy="30" r="1.5"/>
    <circle cx="50" cy="60" r="1.5"/>
    <circle cx="90" cy="60" r="1.5"/>
    <circle cx="130" cy="60" r="1.5"/>
    <circle cx="170" cy="60" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/>
    <circle cx="90" cy="90" r="1.5"/>
    <circle cx="130" cy="90" r="1.5"/>
    <circle cx="630" cy="190" r="1.5"/>
    <circle cx="670" cy="190" r="1.5"/>
    <circle cx="710" cy="190" r="1.5"/>
    <circle cx="750" cy="190" r="1.5"/>
    <circle cx="630" cy="220" r="1.5"/>
    <circle cx="670" cy="220" r="1.5"/>
    <circle cx="710" cy="220" r="1.5"/>
    <circle cx="750" cy="220" r="1.5"/>
    <circle cx="630" cy="250" r="1.5"/>
    <circle cx="670" cy="250" r="1.5"/>
    <circle cx="710" cy="250" r="1.5"/>
    <circle cx="750" cy="250" r="1.5"/>
  </g>
  
  <!-- SonarQube Logo Icon (stylized sonar wave) -->
  <g transform="translate(60, 75)">
    <!-- Sonar waves -->
    <path d="M 0 65 A 65 65 0 0 1 65 0" stroke="#4b9fd5" stroke-width="5" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M 10 65 A 55 55 0 0 1 65 10" stroke="#4b9fd5" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M 20 65 A 45 45 0 0 1 65 20" stroke="#4b9fd5" stroke-width="5" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 30 65 A 35 35 0 0 1 65 30" stroke="#4b9fd5" stroke-width="6" fill="none" opacity="0.9" stroke-linecap="round"/>
    <path d="M 40 65 A 25 25 0 0 1 65 40" stroke="#4b9fd5" stroke-width="6" fill="none" opacity="1" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="6" fill="#4b9fd5" filter="url(#glow)"/>
  </g>
  
  <!-- Main Title -->
  <text x="180" y="105" font-family="Segoe UI, Arial, sans-serif" font-weight="700" font-size="42" fill="white" letter-spacing="-0.5">
    SonarQube
  </text>
  
  <!-- Subtitle -->
  <text x="180" y="145" font-family="Segoe UI, Arial, sans-serif" font-weight="300" font-size="28" fill="#8ebbda" letter-spacing="3">
    TRAINING WORKSHOP
  </text>
  
  <!-- Accent line -->
  <rect x="180" y="160" width="120" height="3" rx="1.5" fill="url(#accentGrad)"/>
  
  <!-- Description -->
  <text x="180" y="195" font-family="Segoe UI, Arial, sans-serif" font-weight="400" font-size="14" fill="#a0aec0">
    Code Quality • Security Analysis • CI/CD Integration
  </text>
  
  <!-- Tags -->
  <g transform="translate(180, 215)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#4b9fd5" opacity="0.15"/>
    <text x="45" y="17" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#4b9fd5" text-anchor="middle" font-weight="600">Hands-on</text>
    
    <rect x="100" y="0" width="100" height="26" rx="13" fill="#36b37e" opacity="0.15"/>
    <text x="150" y="17" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#36b37e" text-anchor="middle" font-weight="600">End-to-End</text>
    
    <rect x="210" y="0" width="110" height="26" rx="13" fill="#e07c4f" opacity="0.15"/>
    <text x="265" y="17" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e07c4f" text-anchor="middle" font-weight="600">Best Practices</text>
  </g>
  
  <!-- Code bracket decorations -->
  <g opacity="0.06" fill="white">
    <text x="620" y="90" font-family="monospace" font-size="120" font-weight="700">{</text>
    <text x="700" y="90" font-family="monospace" font-size="120" font-weight="700">}</text>
  </g>
</svg>
