name: Deploy Codelab to VPS

on:
  push:
    branches: [main]
    paths:
      - 'codelabs/**'
  workflow_dispatch: # manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install claat
        run: |
          curl -L https://github.com/googlecodelabs/tools/releases/latest/download/claat-linux-amd64 -o /usr/local/bin/claat
          chmod +x /usr/local/bin/claat

      - name: Generate Mermaid diagrams
        working-directory: codelabs
        run: |
          mmdc -i diagrams/architecture.mmd   -o img/architecture.png   -b white
          mmdc -i diagrams/scan-flow.mmd      -o img/scan-flow.png      -b white
          mmdc -i diagrams/cicd-flow.mmd      -o img/cicd-flow.png      -b white
          mmdc -i diagrams/triage-flow.mmd    -o img/triage-flow.png    -b white
          mmdc -i diagrams/workshop-setup.mmd -o img/workshop-setup.png -b white
          mmdc -i diagrams/roadmap.mmd        -o img/roadmap.png        -b white
          mmdc -i diagrams/devsecops-flow.mmd -o img/devsecops-flow.png -b white -w 1400

      - name: Export Codelab HTML
        working-directory: codelabs
        run: claat export sonarqube-training.md

      - name: Copy images to codelab output
        working-directory: codelabs
        run: |
          mkdir -p sonarqube-training/img
          cp img/* sonarqube-training/img/

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: codelabs/sonarqube-training/
          remote_path: /var/www/codelab/
          remote_host: 103.30.194.60
          remote_user: mpuhambyah
          remote_key: ${{ secrets.VPS_SSH_KEY }}
