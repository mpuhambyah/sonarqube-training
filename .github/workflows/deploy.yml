name: Deploy Codelabs to VPS

on:
  push:
    branches: [main]
    paths:
      - 'codelabs/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download claat
        run: |
          curl -L -o claat https://github.com/googlecodelabs/tools/releases/latest/download/claat-linux-amd64
          chmod +x claat

      - name: Build codelabs
        working-directory: codelabs
        run: |
          ../claat export sonarqube-training.md

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/codelabs
          cp -r codelabs/sonarqube-training deploy/codelabs/
          cp -r codelabs/img deploy/codelabs/
          cp -r codelabs/diagrams deploy/codelabs/

      - name: Deploy to VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: deploy/codelabs/
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
